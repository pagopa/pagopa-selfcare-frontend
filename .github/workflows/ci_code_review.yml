name: Code Review

# Controls when the workflow will run
on:
  merge_group:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  PROJECT_KEY: pagopa_pagopa-selfcare-frontend
  NODE_VERSION: 22.20.0

permissions:
  id-token: write
  contents: write
  deployments: write
  issues: write
  pull-requests: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      BACKEND_REPO: pagopa/pagopa-selfcare-ms-backoffice-backend

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Set Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Cache Yarn
        uses: actions/cache@2f8e54208210a422b2efd51efaa6bd6d7ca8920f # v3
        with:
          path: |
            ~/.cache/yarn
            node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      # --------------------------------------------------
      # Decide OPENAPI_REF
      # --------------------------------------------------
      - name: Set OPENAPI_REF
        shell: bash
        run: |
          set -euo pipefail

          # try same FE branch on backend; if not found -> main; otherwise -> next (only if branch name is unusable)
          FE_BRANCH_RAW="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          echo "Raw FE branch name: ${FE_BRANCH_RAW}"
          FE_BRANCH="$(printf '%s' "${FE_BRANCH_RAW}" | tr -cd 'A-Za-z0-9._/-')"
          echo "Sanitized FE branch name: ${FE_BRANCH}"

          # If branch name is unusable (sanitized empty), fallback to main (per requirement)
          if [ -z "${FE_BRANCH}" ]; then
            echo "Sanitized branch name is empty. Falling back to main."
            echo "OPENAPI_REF=main" >> "${GITHUB_ENV}"
            exit 0
          fi

          CANDIDATE_URL="https://raw.githubusercontent.com/${BACKEND_REPO}/${FE_BRANCH}/openapi/openapi.json"
          echo "Checking backend OpenAPI at: ${CANDIDATE_URL}"

          if curl -sfL \
            --proto '=https' \
            --proto-redir '=https' \
            "${CANDIDATE_URL}" > /dev/null; then
            echo "OPENAPI_REF=${FE_BRANCH}" >> "${GITHUB_ENV}"
            echo "OPENAPI_REF set to ${FE_BRANCH}"
          else
            echo "OPENAPI_REF=main" >> "${GITHUB_ENV}"
            echo "Backend OpenAPI not found on ${FE_BRANCH}. Falling back to main."
          fi

      - name: Build
        run: |
          set -euo pipefail
          
          export REACT_APP_ENV='dev'
          export INLINE_RUNTIME_CHUNK='false'

          export REACT_APP_URL_FE_LOGIN='https://dev.selfcare.pagopa.it/auth/login'
          export REACT_APP_URL_FE_LOGOUT='https://dev.selfcare.pagopa.it/auth/logout'
          export REACT_APP_URL_FE_LANDING='https://dev.selfcare.pagopa.it/auth/logout'
          export REACT_APP_URL_FE_ASSISTANCE='https://dev.selfcare.pagopa.it/assistenza'
          export REACT_APP_URL_FE_SELFCARE='https://dev.selfcare.pagopa.it/dashboard/'
          export REACT_APP_URL_FE_TOKEN_EXCHANGE='https://dev.selfcare.pagopa.it/token-exchange'

          export REACT_APP_URL_API_TOKEN='https://api.dev.platform.pagopa.it/api/token/token'
          export REACT_APP_URL_BACKOFFICE='https://api.dev.platform.pagopa.it/backoffice/v1'
          export REACT_APP_PUBLIC_URL='/ui'
          export REACT_APP_URL_BETA='false'

          export REACT_APP_API_MOCK_BACKOFFICE='false'
          export REACT_APP_API_MOCK_TOKEN='false'

          export REACT_APP_URL_INSTITUTION_LOGO_PREFIX='https://pagopadselfcaresa.z6.web.core.windows.net/institutions/'

          export REACT_APP_PAGOPA_HELP_EMAIL='assistenza@selfcare.it'
          export REACT_APP_MIXPANEL_TOKEN='DUMMY'
          export REACT_APP_ONETRUST_DOMAIN_ID='a8f58d7a-7f6a-4fe6-ac02-f95bac3876d4-test'

          export REACT_APP_ANALYTICS_ENABLE='false'
          export REACT_APP_ANALYTICS_MOCKED='false'

          echo "Using OPENAPI_REF=${OPENAPI_REF}"
          
          APP_JWT="${{ secrets.APP_JWT }}"

          sed -i "s/\$APP_JWT/${APP_JWT}/g" ./public/redirect.html

          yarn install --ignore-scripts --frozen-lockfile
          
          EVENT_NAME="${{ github.event_name }}"
          REF_NAME="${{ github.ref_name }}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$REF_NAME" = "main" ]; then
                yarn run generate:api-portal
            elif [ "$REF_NAME" = "next" ]; then
                yarn run generate:api-portal-next
            else
                yarn run generate:api-portal-pr
            fi          
          else
            yarn run generate:api-portal-pr
          fi      
          
          yarn build
          mkdir ./out
          mv ./build ./out/ui
          mv ./public/redirect.html ./out/index.html

      - name: Build And Deploy
        id: build_deploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          deployment_environment: staging
          app_location: "/out" # App source code path relative to repository root
          skip_app_build: true
          skip_api_build: true
          skip_deploy_on_missing_secrets: true

  # smoke_test:
  #   name: Smoke Test
  #   needs: build
  #   if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
  #   uses: ./.github/workflows/ci_integration_test.yml
  #   with:
  #     environment: 'local'
  #     notify: false
  #   secrets: inherit

  print_debug:
    runs-on: ubuntu-latest
    steps:
      - name: Dump Inputs
        env:
          JSON_INPUTS: ${{ toJson(inputs) }}
        run: echo "$JSON_INPUTS"

      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: Dump job context
        env:
          JOB_CONTEXT: ${{ toJson(job) }}
        run: echo "$JOB_CONTEXT"
      - name: Dump steps context
        env:
          STEPS_CONTEXT: ${{ toJson(steps) }}
        run: echo "$STEPS_CONTEXT"
      - name: Dump runner context
        env:
          RUNNER_CONTEXT: ${{ toJson(runner) }}
        run: echo "$RUNNER_CONTEXT"
      - name: Dump strategy context
        env:
          STRATEGY_CONTEXT: ${{ toJson(strategy) }}
        run: echo "$STRATEGY_CONTEXT"
      - name: Dump matrix context
        env:
          MATRIX_CONTEXT: ${{ toJson(matrix) }}
        run: echo "$MATRIX_CONTEXT"

  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Set Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint
        run: |
          yarn install --ignore-scripts --frozen-lockfile
          yarn lint

  test:
    name: Unit Test & Sonar
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Set Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Unit Tests
        run: |
          set -euo pipefail
          
          yarn install --ignore-scripts --frozen-lockfile

          EVENT_NAME="${{ github.event_name }}"
          REF_NAME="${{ github.ref_name }}"
          
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$REF_NAME" = "main" ]; then
                yarn run generate:api-portal
            elif [ "$REF_NAME" = "next" ]; then
                yarn run generate:api-portal-next
            else
                yarn run generate:api-portal-pr
            fi          
          else
            yarn run generate:api-portal-pr
          fi   

          yarn test:coverage --watchAll=false

      # Columns files are excluded from duplication check as they are similar by nature
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.coverage.exclusions=**/utils/**,**/__mocks__/**,**/__tests__/**,**/api/**,**/integration-test/**,**/openApi/**,**/model/**,**/hooks/**,**/MyHeaderProduct.tsx
            -Dsonar.cpd.exclusions=**/__mocks__/**,**/__tests__/**,**/integration-test/**,**/openApi/**,**/*Columns.tsx
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"

  delete-branch:
    name: delete branch when closed
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Checkout repository
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Delete branch
        run: |
          set -euo pipefail
          BRANCH="${{ github.head_ref }}"
          echo "Deleting branch $BRANCH"
          git push origin --delete "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
